            };

                const days = []; 
                const today = new Date(); 
                for (let i = 55; i >= 0; i--) {

                    d.setDate(today.getDate() - i); 
                    days.push(formatDate(d)); 
                } 
                return days;

                    const targetLine = new Array(56).fill(target);
                    
                    const gradient = ctx.createLinearGradient(0, 0, 0, 200); 
                    gradient.addColorStop(0, 'rgba(59, 130, 246, 0.3)'); 
                    gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

                    kcalChartInstance.current = new Chart(ctx, { 
                        type: 'line', 
                        data: { 
                            labels: labels, 
                            datasets: [
                                { label: 'Kcal nạp', data: dataKcal, borderColor: '#3B82F6', backgroundColor: gradient, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, fill: true, tension: 0.4 }, 
                                { label: 'Mục tiêu', data: targetLine, borderColor: '#cbd5e1', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, fill: false, tension: 0 }
                            ] 
                        }, 
                        options: { 
                            responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, 
                            plugins: { 
                                legend: { display: false }, 
                                tooltip: { backgroundColor: '#0F172A', titleFont: { size: 11, family: 'Inter', weight: '800' }, bodyFont: { size: 12, family: 'Inter', weight: 'bold' }, padding: 10, cornerRadius: 12 } 
                            }, 
                            scales: { 
                                y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { display: false }, ticks: { font: { weight: 'bold', size: 10 } } }, 
                                x: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: 'bold', size: 9 }, maxTicksLimit: 8 } } 
                            } 
                        } 
                    });
                }

                // 3. BIỂU ĐỒ MACRO
                if (macroChartInstance.current) {
                    macroChartInstance.current.destroy();
                }
                if (macroChartRef.current) {
                    const ctx = macroChartRef.current.getContext('2d');
                    const last28Days = getLast56Days().slice(28); 
                    const labels = last28Days.map(d => getWeekLabel(d));
                    const dataProtein = last28Days.map(d => Math.round(sumDayMacro(history[d], 'protein'))); 
                    const dataFat = last28Days.map(d => Math.round(sumDayMacro(history[d], 'fat')));

                    macroChartInstance.current = new Chart(ctx, { 
                        type: 'line', 
                        data: { 
                            labels: labels, 
                            datasets: [
                                { label: 'Protein (g)', data: dataProtein, borderColor: '#10B981', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 2.5, pointRadius: 0, pointHoverRadius: 4, fill: true, tension: 0.4 }, 
                                { label: 'Fat (g)', data: dataFat, borderColor: '#F59E0B', backgroundColor: 'rgba(245, 158, 11, 0.1)', borderWidth: 2.5, pointRadius: 0, pointHoverRadius: 4, fill: true, tension: 0.4 }
                            ] 
                        }, 
                        options: { 
                            responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, 
                            plugins: { 
                                legend: { display: true, position: 'top', align: 'end', labels: { boxWidth: 10, boxHeight: 10, usePointStyle: true, font: { size: 10, family: 'Inter', weight: 'bold' } } }, 
                                tooltip: { backgroundColor: '#0F172A', titleFont: { size: 11, family: 'Inter', weight: '800' }, bodyFont: { size: 12, family: 'Inter', weight: 'bold' }, padding: 10, cornerRadius: 12 } 
                            }, 
                            scales: { 
                                y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { display: false }, ticks: { font: { weight: 'bold', size: 10 } } }, 
                                x: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: 'bold', size: 9 }, maxTicksLimit: 7 } } 
                            } 
                        } 
                    });
                }
                
                return () => { 
                    if (weightChartInstance.current) weightChartInstance.current.destroy(); 
                    if (kcalChartInstance.current) kcalChartInstance.current.destroy(); 
                    if (macroChartInstance.current) macroChartInstance.current.destroy(); 
                };
            }, [history, weightLog, target]);

            const sortedDates = Object.keys(weightLog).sort((a, b) => new Date(b) - new Date(a));

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-28 animate-in fade-in duration-300 relative text-slate-800">
                    <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center shadow-sm sticky top-0 z-20">
                        <h1 className="font-black uppercase tracking-widest text-slate-800 text-xs">Thống kê & Biểu đồ</h1>
                    </header>

                    <main className="p-4 space-y-6">
                        <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Cập nhật cân nặng</h3>
                            <div className="flex gap-2 mb-4">
                                <input 
                                    type="number" 
                                    value={weightInput} 
                                    onChange={e=>setWeightInput(e.target.value)} 
                                    step="0.1" 
                                    placeholder="Hôm nay bao nhiêu kg?" 
                                    className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" 
                                />
                                <button 
                                    onClick={saveWeight} 
                                    className="px-6 bg-emerald-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all shadow-lg shadow-emerald-200"
                                >
                                    Ghi
                                </button>
                            </div>

                            <h4 className="text-[9px] font-black uppercase tracking-widest text-slate-300 mb-2 mt-6">Lịch sử (8 tuần)</h4>
                            <div className="max-h-32 overflow-y-auto no-scrollbar bg-slate-50 rounded-2xl p-2 border border-slate-100">
                                {sortedDates.length === 0 ? (
                                    <p className="text-center text-slate-400 text-[10px] uppercase font-bold italic py-4">Chưa có bản ghi</p>
                                ) : (
                                    sortedDates.slice(0, 56).map(date => (
                                        <div key={date} className="flex justify-between items-center p-3 bg-white rounded-xl mb-1 shadow-sm border border-slate-50">
                                            <div className="flex items-center gap-3">
                                                <span className="text-[10px] font-black uppercase text-slate-400 bg-slate-50 px-2 py-1 rounded-lg">
                                                    {getWeekLabel(date)}/{date.split('-')[0]}
                                                </span>
                                                <span className="text-sm font-black text-slate-800">
                                                    {weightLog[date]} <span className="text-[10px] font-bold italic opacity-40">kg</span>
                                                </span>
                                            </div>
                                            <button 
                                                onClick={() => deleteWeight(date)} 
                                                className="p-2 text-slate-200 hover:text-red-500 bg-slate-50 rounded-lg transition-colors group"
                                            >
                                                <IconTrash />
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>

                        <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 relative">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Biểu đồ cân nặng</h3>
                            {sortedDates.length === 0 && (
                                <div className="absolute inset-0 flex items-center justify-center bg-white/80 rounded-[2.5rem] z-10">
                                    <p className="text-xs font-bold text-slate-400 italic">Chưa có dữ liệu</p>
                                </div>
                            )}
                            <div className="h-48 relative w-full"><canvas ref={weightChartRef}></canvas></div>
                        </section>

                        <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Calo nạp vào (8 Tuần)</h3>
                            <div className="h-48 relative w-full"><canvas ref={kcalChartRef}></canvas></div>
                        </section>

                        <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Protein & Fat (4 Tuần)</h3>
                            <div className="h-48 relative w-full"><canvas ref={macroChartRef}></canvas></div>
                        </section>
                    </main>
                    <BottomNav view={view} setView={setView} />
                </div>
            );
        }

        function BottomNav({view, setView}) {
            return (
                <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 z-40 flex justify-around items-center rounded-t-[2.5rem] shadow-[0_-10px_30px_rgba(0,0,0,0.03)] max-w-md mx-auto">
                    <button 
                        onClick={() => setView("journal")} 
                        className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view==='journal' ? 'text-emerald-600 scale-110 font-black':'text-slate-300 opacity-60'}`}
                    >
                        <IconJournal />
                        <span className="text-[9px] uppercase font-bold tracking-tighter">Nhật ký</span>
                    </button>
                    
                    <button 
                        onClick={() => setView("calendar")} 
                        className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view==='calendar' ? 'text-emerald-600 scale-110 font-black':'text-slate-300 opacity-60'}`}
                    >
                        <IconCalendar />
                        <span className="text-[9px] uppercase font-bold tracking-tighter">Lịch trình</span>
                    </button>
                    
                    <button 
                        onClick={() => setView("stats")} 
                        className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view==='stats' ? 'text-emerald-600 scale-110 font-black':'text-slate-300 opacity-60'}`}
                    >
                        <IconStats />
                        <span className="text-[9px] uppercase font-bold tracking-tighter">Thống kê</span>
                    </button>
                    
                    <button 
                        onClick={() => setView("profile")} 
                        className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view==='profile' ? 'text-emerald-600 scale-110 font-black':'text-slate-300 opacity-60'}`}
                    >
                        <IconUser />
                        <span className="text-[9px] uppercase font-bold tracking-tighter">Hồ sơ</span>
                    </button>
                </div>
            );
        }

        function App() {
            const [userId, setUserId] = useState(() => localStorage.getItem('stayfit_userid') || "");
            const [password, setPassword] = useState(() => localStorage.getItem('stayfit_password') || "");
            
            const [view, setView] = useState(() => localStorage.getItem('stayfit_setup') ? "journal" : "profile");
            const [currentDate, setCurrentDate] = useState(formatDate(new Date()));
            
            // THÊM: Các state cho Tính năng 7 (isManualMacro, manualProtein, manualCarb, manualFat)
            const [profile, setProfile] = useState(() => { 
                const s = localStorage.getItem('stayfit_profile'); 
                const parsed = s ? JSON.parse(s) : {};
                return { 
                    gender: "male", age: 25, height: 165, weight: 60, activity: 1.375, goal: 0, 
                    isManualTarget: false, manualTargetKcal: 2000,
                    isManualMacro: false, manualProtein: 125, manualCarb: 250, manualFat: 55,
                    ...parsed
                }; 
            });
            
            const [history, setHistory] = useState(() => { 
                const s = localStorage.getItem('stayfit_history'); 
                return s ? JSON.parse(s) : {}; 
            });
            
            const [customFoodList, setCustomFoodList] = useState(() => { 
                const s = localStorage.getItem('stayfit_custom_foods'); 
                return s ? JSON.parse(s) : []; 
            });
            
            const [deletedCommonFoods, setDeletedCommonFoods] = useState(() => { 
                const s = localStorage.getItem('stayfit_deleted_common'); 
                return s ? JSON.parse(s) : []; 
            });

            const [tab, setTab] = useState("quick");
            
            const [selectedMeal, setSelectedMeal] = useState(() => {
                try {
                    const vnTimeStr = new Date().toLocaleString("en-US", { timeZone: "Asia/Ho_Chi_Minh" });
                    const hour = new Date(vnTimeStr).getHours();
                    
                    if (hour >= 4 && hour < 10) return "Bữa sáng";
                    if (hour >= 10 && hour < 14) return "Bữa trưa";
                    if (hour >= 14 && hour < 17) return "Ăn vặt";
                    if (hour >= 17 && hour < 21) return "Bữa tối";
                    return "Ăn vặt"; 
                } catch (error) {
                    return "Bữa sáng";
                }
            });

            const [selectedFood, setSelectedFood] = useState(null);
            const [qty, setQty] = useState(1);
            const [searchQuery, setSearchQuery] = useState("");
            
            const [customFood, setCustomFood] = useState({ 
                name: "", quantity: 1, unit: "g", kcal: "", protein: "", carb: "", fat: "" 
            });
            const [confirmModal, setConfirmModal] = useState({ 
                isOpen: false, foodToDelete: null, alertMessage: "" 
            });

            const [inputUser, setInputUser] = useState("");
            const [inputPass, setInputPass] = useState("");
            const [loginLoading, setLoginLoading] = useState(false);
            
            // State cho modal chọn chế độ ăn
            const [showMacroModal, setShowMacroModal] = useState(false);
            
            // Dữ liệu các chế độ ăn
            const dietPlans = {
                balanced: [
                    { name: "Tiêu chuẩn (Standard)", protein: 88, carb: 225, fat: 56, desc: "45-65% Carb, 10-35% Protein, 20-35% Fat" },
                    { name: "Địa Trung Hải", protein: 66, carb: 230, fat: 66, desc: "50-55% Carb, 15% Protein, 30-35% Fat" },
                    { name: "DASH", protein: 79, carb: 242, fat: 61, desc: "55% Carb, 18% Protein, 27% Fat" }
                ],
                weightLoss: [
                    { name: "Keto", protein: 88, carb: 44, fat: 110, desc: "5-10% Carb, 15-20% Protein, 70-75% Fat" },
                    { name: "Low Carb", protein: 110, carb: 110, fat: 110, desc: "20-30% Carb, 25-35% Protein, 35-50% Fat" },
                    { name: "Zone (40:30:30)", protein: 110, carb: 220, fat: 73, desc: "40% Carb, 30% Protein, 30% Fat" }
                ],
                special: [
                    { name: "Paleo", protein: 99, carb: 154, fat: 95, desc: "22-40% Carb, 19-35% Protein, 28-58% Fat" },
                    { name: "Bodybuilding", protein: 132, carb: 242, fat: 61, desc: "40-60% Carb, 25-35% Protein, 15-25% Fat" },
                    { name: "Low Fat", protein: 110, carb: 330, fat: 33, desc: "60% Carb, 25% Protein, 15% Fat" }
                ]
            };

            useEffect(() => {
                localStorage.setItem('stayfit_profile', JSON.stringify(profile));
                localStorage.setItem('stayfit_history', JSON.stringify(history));
                localStorage.setItem('stayfit_custom_foods', JSON.stringify(customFoodList));
                localStorage.setItem('stayfit_deleted_common', JSON.stringify(deletedCommonFoods));
                if (view !== "profile" && userId) {
                    localStorage.setItem('stayfit_setup', 'done');
                }
            }, [profile, history, customFoodList, deletedCommonFoods, view, userId]);

            const syncToCloud = async () => {
                if (!userId || !password) return; 
                try {
                    const profileToSave = JSON.parse(localStorage.getItem("stayfit_profile") || "{}");
                    if (!profileToSave.isManualTarget) {
                        profileToSave.manualTargetKcal = "";
                    }
                    // Dọn dẹp dữ liệu nếu không bật Tính năng 7
                    if (!profileToSave.isManualMacro) {
                        profileToSave.manualProtein = "";
                        profileToSave.manualCarb = "";
                        profileToSave.manualFat = "";
                    }

                    const res = await fetch("/api/sync", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            action: "upload", 
                            userId: userId, 
                            password: password, 
                            profile: profileToSave,
                            history: JSON.parse(localStorage.getItem("stayfit_history") || "{}"),
                            weightLog: JSON.parse(localStorage.getItem("stayfit_weight_log") || "{}"),
                        }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);
                } catch (err) { 
                    console.error("Lỗi lưu ngầm:", err.message); 
                }
            };

            const syncFromCloud = async () => {
                if (!userId || !password) return; 
                try {
                    const res = await fetch(`/api/sync?userId=${userId}&password=${password}`);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);
                    
                    const isCloudEmpty = Object.keys(data).length === 0 || (!data.profile && !data.history);
                    if (isCloudEmpty) return;

                    if (data.profile) {
                        data.profile.isManualTarget = typeof data.profile.manualTargetKcal === 'number' && !isNaN(data.profile.manualTargetKcal);
                        if (!data.profile.isManualTarget) data.profile.manualTargetKcal = 2000; 
                        
                        // CHỐT CHẶN: Giữ lại cài đặt Macro Tùy chỉnh (Tính năng 7) từ Local vì Backend chưa có cột này
                        const localProfile = JSON.parse(localStorage.getItem('stayfit_profile') || "{}");
                        data.profile.isManualMacro = localProfile.isManualMacro || false;
                        data.profile.manualProtein = localProfile.manualProtein || 125;
                        data.profile.manualCarb = localProfile.manualCarb || 250;
                        data.profile.manualFat = localProfile.manualFat || 55;

                        localStorage.setItem("stayfit_profile", JSON.stringify(data.profile));
                    }

                    if (data.history) localStorage.setItem("stayfit_history", JSON.stringify(data.history));
                    if (data.weightLog) localStorage.setItem("stayfit_weight_log", JSON.stringify(data.weightLog));
                    
                    const syncFlag = sessionStorage.getItem(`sync_done_${userId}`);
                    if (!syncFlag) {
                        sessionStorage.setItem(`sync_done_${userId}`, 'true');
                        window.location.reload();
                    }
                } catch (err) { 
                    console.error("Lỗi tải ngầm:", err.message); 
                }
            };

            const handleLogin = async () => {
                const uid = inputUser.trim().toLowerCase();
                const pwd = inputPass.trim();
                
                if (!uid || !pwd) { 
                    alert("Vui lòng nhập cả ID và Mật khẩu!"); 
                    return; 
                }

                setLoginLoading(true);
                try {
                    const res = await fetch(`/api/sync?userId=${uid}&password=${pwd}`);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);

                    localStorage.setItem('stayfit_userid', uid);
                    localStorage.setItem('stayfit_password', pwd);
                    
                    if (data.profile) {
                        data.profile.isManualTarget = typeof data.profile.manualTargetKcal === 'number' && !isNaN(data.profile.manualTargetKcal);
                        if (!data.profile.isManualTarget) data.profile.manualTargetKcal = 2000;
                        
                        // CHỐT CHẶN BẢO VỆ
                        const localProfile = JSON.parse(localStorage.getItem('stayfit_profile') || "{}");
                        data.profile.isManualMacro = localProfile.isManualMacro || false;
                        data.profile.manualProtein = localProfile.manualProtein || 125;
                        data.profile.manualCarb = localProfile.manualCarb || 250;
                        data.profile.manualFat = localProfile.manualFat || 55;

                        localStorage.setItem("stayfit_profile", JSON.stringify(data.profile));
                    }
                    if (data.history) localStorage.setItem("stayfit_history", JSON.stringify(data.history));
                    if (data.weightLog) localStorage.setItem("stayfit_weight_log", JSON.stringify(data.weightLog));

                    window.location.reload();
                } catch (err) { 
                    alert("❌ Lỗi: " + err.message); 
                } finally { 
                    setLoginLoading(false); 
                }
            };

            useEffect(() => {
                if (!userId || !password) return;
                const hasInitialSync = sessionStorage.getItem(`stayfit_initial_sync_${userId}`);
                if (!hasInitialSync) {
                    sessionStorage.setItem(`stayfit_initial_sync_${userId}`, 'true');
                    syncFromCloud();
                }
            }, [userId, password]);

            const isFirstRender = useRef(true);
            useEffect(() => {
                if (isFirstRender.current) { 
                    isFirstRender.current = false; 
                    return; 
                }
                const timeoutId = setTimeout(() => { syncToCloud(); }, 2500);
                return () => clearTimeout(timeoutId);
            }, [history, profile]); 

            useEffect(() => {
                const handleVisibilityChange = () => { 
                    if (document.visibilityState === 'hidden') syncToCloud(); 
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                const now = new Date();
                const millisTillMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999) - now;
                const midnightTimer = setTimeout(() => { syncToCloud(); }, millisTillMidnight);
                return () => { 
                    document.removeEventListener('visibilitychange', handleVisibilityChange); 
                    clearTimeout(midnightTimer); 
                };
            }, []);

            const calculatedTarget = useMemo(() => {
                let bmr;
                if (profile.gender === "male") {
                    bmr = 10 * profile.weight + 6.25 * profile.height - 5 * profile.age + 5;
                } else {
                    bmr = 10 * profile.weight + 6.25 * profile.height - 5 * profile.age - 161;
                }
                return Math.round(bmr * profile.activity) + profile.goal;
            }, [profile.gender, profile.weight, profile.height, profile.age, profile.activity, profile.goal]);

            const target = profile.isManualTarget ? profile.manualTargetKcal : calculatedTarget;
            const dailyLog = history[currentDate] || [];
            
            const dailyKcal = Math.round(dailyLog.reduce((s, i) => s + (i.kcal || 0), 0) * 10) / 10;
            const dailyProtein = Math.round(dailyLog.reduce((s, i) => s + (i.protein || 0), 0) * 10) / 10;
            const dailyCarb = Math.round(dailyLog.reduce((s, i) => s + (i.carb || 0), 0) * 10) / 10;
            const dailyFat = Math.round(dailyLog.reduce((s, i) => s + (i.fat || 0), 0) * 10) / 10;
            
            // ÁP DỤNG TÍNH NĂNG 7: Chuyển đổi giữa Tự Động và Tùy Chỉnh
            const targetProtein = profile.isManualMacro ? (parseFloat(profile.manualProtein) || 0) : Math.round((target * 0.25 / 4) * 10) / 10;
            const targetCarb = profile.isManualMacro ? (parseFloat(profile.manualCarb) || 0) : Math.round((target * 0.50 / 4) * 10) / 10;
            const targetFat = profile.isManualMacro ? (parseFloat(profile.manualFat) || 0) : Math.round((target * 0.25 / 9) * 10) / 10;

            const calendarData = useMemo(() => {
                const baseDate = new Date(currentDate); 
                const year = baseDate.getFullYear(); 
                const month = baseDate.getMonth();
                const firstDayOfMonth = new Date(year, month, 1).getDay(); 
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                let monthTotalKcal = 0; 
                const daysArray = [];
                
                for(let i = 0; i < firstDayOfMonth; i++) {
                    daysArray.push(null);
                }
                
                for(let d = 1; d <= daysInMonth; d++) {
                    const key = formatDate(new Date(year, month, d)); 
                    const kcal = (history[key] || []).reduce((s, i) => s + (i.kcal || 0), 0);
                    monthTotalKcal += kcal; 
                    daysArray.push({ day: d, key: key, kcal: Math.round(kcal * 10) / 10 });
                }
                
                return { 
                    days: daysArray, 
                    monthTotalKcal: Math.round(monthTotalKcal * 10) / 10, 
                    monthName: `Tháng ${month + 1}, ${year}` 
                };
            }, [currentDate, history]);

            const mealBreakdown = useMemo(() => {
                const meals = [ 
                    { name: "Bữa sáng", icon: "☀️", color: "bg-orange-400" }, 
                    { name: "Bữa trưa", icon: "🌤️", color: "bg-emerald-500" }, 
                    { name: "Bữa tối", icon: "🌙", color: "bg-blue-500" }, 
                    { name: "Ăn vặt", icon: "⭐", color: "bg-purple-400" } 
                ];
                return meals.map(meal => {
                    const mealTotal = dailyLog
                        .filter(item => item.meal === meal.name)
                        .reduce((sum, item) => sum + (item.kcal || 0), 0);
                    return { ...meal, kcal: Math.round(mealTotal * 10) / 10 };
                });
            }, [dailyLog]);

            const maxMealKcal = Math.max(...mealBreakdown.map(m => m.kcal), 1);
            const isDailyLogEmpty = mealBreakdown.every(m => m.kcal === 0);

            const allFoods = useMemo(() => {
                const common = COMMON_FOODS.filter(f => !deletedCommonFoods.includes(f.name));
                return [...customFoodList, ...common];
            }, [customFoodList, deletedCommonFoods]);
            
            const filteredFoods = useMemo(() => {
                let results = allFoods;
                if (searchQuery.trim()) {
                    const query = removeAccents(searchQuery.toLowerCase().trim());
                    results = allFoods.filter(f => removeAccents(f.name.toLowerCase()).includes(query));
                }
                return results.slice(0, 50);
            }, [searchQuery, allFoods]);

            const handleAddSelectedFood = () => {
                if (!selectedFood) return;
                
                const quantity = parseFloat(qty) || 0;
                const vnTime = new Date().toLocaleString("sv-SE", { timeZone: "Asia/Ho_Chi_Minh" });

                const newItem = { 
                    name: selectedFood.name, 
                    quantity: quantity, 
                    unit: selectedFood.unit,
                    kcal: calcMacro(selectedFood.kcal, selectedFood.per, quantity), 
                    protein: calcMacro(selectedFood.protein, selectedFood.per, quantity),
                    carb: calcMacro(selectedFood.carb, selectedFood.per, quantity), 
                    fat: calcMacro(selectedFood.fat, selectedFood.per, quantity),
                    meal: selectedMeal, 
                    id: Date.now(),
                    timestamp: vnTime
                };
                
                setHistory(prev => ({
                    ...prev, 
                    [currentDate]: [...(prev[currentDate] || []), newItem]
                }));
                
                setSelectedFood(null); 
                setSearchQuery(""); 
                setQty(1);
            };

            const addCustom = () => {
                if (!customFood.name || !customFood.kcal) return;
                
                const foodName = customFood.name.trim();
                const isDuplicate = allFoods.some(food => {
                    return food.name.toLowerCase().trim() === foodName.toLowerCase();
                });
                
                if (isDuplicate) { 
                    setConfirmModal({ 
                        isOpen: true, 
                        foodToDelete: null, 
                        alertMessage: "Món ăn này đã có sẵn. Vui lòng chọn trong Chọn nhanh!" 
                    }); 
                    return; 
                }
                
                const q = parseFloat(customFood.quantity) || 1; 
                const u = (customFood.unit || "g").toLowerCase();
                const k = parseFloat(customFood.kcal) || 0; 
                const p = parseFloat(customFood.protein) || 0;
                const c = parseFloat(customFood.carb) || 0; 
                const f = parseFloat(customFood.fat) || 0;

                const vnTime = new Date().toLocaleString("sv-SE", { timeZone: "Asia/Ho_Chi_Minh" });

                const newItem = {
                    name: foodName, 
                    quantity: q, 
                    unit: u, 
                    kcal: Math.round(k * 10) / 10,
                    protein: Math.round(p * 10) / 10, 
                    carb: Math.round(c * 10) / 10, 
                    fat: Math.round(f * 10) / 10,
                    meal: selectedMeal, 
                    id: Date.now(),
                    timestamp: vnTime
                };
                
                setHistory(prev => ({
                    ...prev, 
                    [currentDate]: [...(prev[currentDate] || []), newItem]
                }));

                let weightInGrams = q;
                let baseUnit = 'g';

                if (['kg'].includes(u)) { weightInGrams = q * 1000; }
                else if (['l', 'lít'].includes(u)) { weightInGrams = q * 1000; baseUnit = 'ml'; }
                else if (['ml'].includes(u)) { weightInGrams = q; baseUnit = 'ml'; }
                else if (['g', 'gram'].includes(u)) { weightInGrams = q; }
                else {
                    const mockWeights = { 'tô': 400, 'bát': 400, 'suất': 400, 'phần': 300, 'ly': 250, 'ổ': 150, 'quả': 100, 'trái': 100, 'cái': 100 };
                    weightInGrams = q * (mockWeights[u] || 100);
                }

                const factor100g = weightInGrams > 0 ? (100 / weightInGrams) : 1;
                
                const newQuickFood = { 
                    name: foodName, unit: baseUnit, per: 100, 
                    kcal: Math.round(k * factor100g), 
                    protein: Math.round((p * factor100g) * 10) / 10, 
                    carb: Math.round((c * factor100g) * 10) / 10, 
                    fat: Math.round((f * factor100g) * 10) / 10 
                };
                
                setCustomFoodList(prev => [newQuickFood, ...prev]);
                setCustomFood({ name: "", quantity: 1, unit: "g", kcal: "", protein: "", carb: "", fat: "" });
                setTab("quick");
            };

            const removeFood = (id) => {
                setHistory(prev => {
                    const filteredLog = (prev[currentDate] || []).filter(i => i.id !== id);
                    return { ...prev, [currentDate]: filteredLog };
                });
            };

            const handleConfirmDelete = () => {
                if (!confirmModal.foodToDelete) return;
                const foodName = confirmModal.foodToDelete.name;
                
                setCustomFoodList(prev => prev.filter(f => f.name !== foodName));
                if (COMMON_FOODS.some(f => f.name === foodName)) {
                    setDeletedCommonFoods(prev => [...prev, foodName]);
                }
                
                setConfirmModal({ isOpen: false, foodToDelete: null, alertMessage: "" });
                setSelectedFood(null); 
            };

            const updateItemMeal = (id, newMeal) => {
                setHistory(prev => {
                    const currentDayLog = prev[currentDate] || [];
                    const updatedLog = currentDayLog.map(item => {
                        if (item.id === id) { return { ...item, meal: newMeal }; }
                        return item;
                    });
                    return { ...prev, [currentDate]: updatedLog };
                });
            };

            // === 1. MÀN HÌNH ĐĂNG NHẬP ===
            if (!userId || !password) {
                return (
                    <div className="max-w-md mx-auto min-h-screen bg-emerald-600 flex flex-col items-center justify-center p-8 text-white relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500 rounded-full blur-3xl opacity-50 -translate-y-1/2 translate-x-1/3"></div>
                        <div className="absolute bottom-0 left-0 w-64 h-64 bg-emerald-700 rounded-full blur-3xl opacity-50 translate-y-1/3 -translate-x-1/3"></div>
                        
                        <div className="bg-white/10 p-8 rounded-[2.5rem] w-full backdrop-blur-xl border border-white/20 text-center shadow-2xl relative z-10">
                            <h1 className="text-4xl font-black tracking-tighter italic mb-8">STAYFIT</h1>
                            
                            <div className="space-y-3 mb-6">
                                <input 
                                    type="text" 
                                    value={inputUser} 
                                    onChange={e=>setInputUser(e.target.value)} 
                                    placeholder="Tên ID (vd: quy2026)" 
                                    className="w-full bg-white/20 text-white placeholder:text-white/60 p-4 rounded-2xl outline-none font-bold text-center focus:ring-2 focus:ring-white transition-all" 
                                />
                                <input 
                                    type="password" 
                                    value={inputPass} 
                                    onChange={e=>setInputPass(e.target.value)} 
                                    placeholder="Mật khẩu" 
                                    className="w-full bg-white/20 text-white placeholder:text-white/60 p-4 rounded-2xl outline-none font-bold text-center focus:ring-2 focus:ring-white transition-all" 
                                    onKeyDown={(e) => { 
                                        if (e.key === 'Enter') handleLogin(); 
                                    }} 
                                />
                            </div>

                            <button 
                                onClick={handleLogin} 
                                disabled={loginLoading} 
                                className="w-full py-4 bg-white text-emerald-600 rounded-2xl font-black uppercase tracking-widest hover:scale-95 transition-all shadow-xl disabled:opacity-50"
                            >
                                {loginLoading ? "Đang kết nối..." : "Đăng Nhập"}
                            </button>
                            <p className="text-[9px] text-white/50 font-bold mt-4 px-4 leading-relaxed">
                                Nếu chưa có tài khoản, hãy nhập ID & Mật khẩu mới để tự động đăng ký.
                            </p>
                        </div>
                    </div>
                );
            }

            // === 2. MÀN HÌNH THỐNG KÊ ===
            if (view === "stats") {
                return <StatsView history={history} profile={profile} setProfile={setProfile} target={target} setView={setView} view={view} />;
            }
            
            // === MODAL CHỌN CHẾ ĐỘ ĂN ===
            const MacroModal = () => {
                const [touchStart, setTouchStart] = useState(null);
                const [touchEnd, setTouchEnd] = useState(null);
                
                const onTouchStart = (e) => setTouchStart(e.targetTouches[0].clientY);
                const onTouchEnd = (e) => {
                    setTouchEnd(e.changedTouches[0].clientY);
                    if (touchStart && e.changedTouches[0].clientY - touchStart > 100) {
                        setShowMacroModal(false);
                    }
                };
                
                return showMacroModal && (
                    <div 
                        className="fixed inset-0 bg-black/40 z-50 flex flex-col animate-in fade-in duration-200"
                        onClick={() => setShowMacroModal(false)}
                    >
                        <div 
                            className="w-full bg-white flex flex-col h-full animate-in slide-in-from-bottom-5"
                            onClick={(e) => e.stopPropagation()}
                            onTouchStart={onTouchStart}
                            onTouchEnd={onTouchEnd}
                        >
                            {/* Header với Handle Bar */}
                            <div className="sticky top-0 bg-gradient-to-b from-white to-slate-50 px-6 pt-4 pb-6 border-b border-slate-100 rounded-t-3xl">
                                {/* Handle Bar */}
                                <div className="flex justify-center mb-4">
                                    <div className="w-10 h-1 bg-slate-300 rounded-full" />
                                </div>
                                <h2 className="text-2xl font-black text-slate-900">Chọn Chế Độ Ăn</h2>
                                <p className="text-xs text-slate-500 font-semibold uppercase tracking-widest mt-1">Tự động cập nhật Macro</p>
                                <p className="text-[11px] text-slate-400 mt-2">💡 Kéo xuống để đóng</p>
                            </div>
                            
                            {/* Content - Scrollable */}
                            <div className="flex-1 overflow-y-auto px-6 py-6 space-y-7">
                                {/* Danh mục 1: Cân bằng & Lành mạnh */}
                                <div>
                                    <h3 className="text-sm font-black text-emerald-700 uppercase mb-4 tracking-wider flex items-center gap-2">
                                        <span className="text-xl">1️⃣</span>
                                        Cân Bằng & Lành Mạnh
                                    </h3>
                                    <div className="space-y-3">
                                        {dietPlans.balanced.map((plan, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => {
                                                    setProfile({...profile, manualProtein: plan.protein, manualCarb: plan.carb, manualFat: plan.fat});
                                                    setShowMacroModal(false);
                                                }}
                                                className="w-full text-left p-4 bg-emerald-50 border-2 border-emerald-200 rounded-2xl hover:bg-emerald-100 hover:border-emerald-400 transition-all active:scale-95"
                                            >
                                                <p className="font-black text-base text-emerald-900">{plan.name}</p>
                                                <p className="text-sm text-emerald-700 font-semibold mt-2 leading-relaxed">{plan.desc}</p>
                                                <div className="flex gap-4 mt-3 text-emerald-600 font-bold text-sm">
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-emerald-300">P: {plan.protein}g</span>
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-emerald-300">C: {plan.carb}g</span>
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-emerald-300">F: {plan.fat}g</span>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                {/* Danh mục 2: Giảm cân & Chuyển hóa mỡ */}
                                <div>
                                    <h3 className="text-sm font-black text-orange-700 uppercase mb-4 tracking-wider flex items-center gap-2">
                                        <span className="text-xl">2️⃣</span>
                                        Giảm Cân & Chuyển Hóa Mỡ
                                    </h3>
                                    <div className="space-y-3">
                                        {dietPlans.weightLoss.map((plan, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => {
                                                    setProfile({...profile, manualProtein: plan.protein, manualCarb: plan.carb, manualFat: plan.fat});
                                                    setShowMacroModal(false);
                                                }}
                                                className="w-full text-left p-4 bg-orange-50 border-2 border-orange-200 rounded-2xl hover:bg-orange-100 hover:border-orange-400 transition-all active:scale-95"
                                            >
                                                <p className="font-black text-base text-orange-900">{plan.name}</p>
                                                <p className="text-sm text-orange-700 font-semibold mt-2 leading-relaxed">{plan.desc}</p>
                                                <div className="flex gap-4 mt-3 text-orange-600 font-bold text-sm">
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-orange-300">P: {plan.protein}g</span>
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-orange-300">C: {plan.carb}g</span>
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-orange-300">F: {plan.fat}g</span>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                {/* Danh mục 3: Đặc thù khác */}
                                <div>
                                    <h3 className="text-sm font-black text-violet-700 uppercase mb-4 tracking-wider flex items-center gap-2">
                                        <span className="text-xl">3️⃣</span>
                                        Đặc Thù Khác
                                    </h3>
                                    <div className="space-y-3">
                                        {dietPlans.special.map((plan, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => {
                                                    setProfile({...profile, manualProtein: plan.protein, manualCarb: plan.carb, manualFat: plan.fat});
                                                    setShowMacroModal(false);
                                                }}
                                                className="w-full text-left p-4 bg-violet-50 border-2 border-violet-200 rounded-2xl hover:bg-violet-100 hover:border-violet-400 transition-all active:scale-95"
                                            >
                                                <p className="font-black text-base text-violet-900">{plan.name}</p>
                                                <p className="text-sm text-violet-700 font-semibold mt-2 leading-relaxed">{plan.desc}</p>
                                                <div className="flex gap-4 mt-3 text-violet-600 font-bold text-sm">
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-violet-300">P: {plan.protein}g</span>
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-violet-300">C: {plan.carb}g</span>
                                                    <span className="bg-white px-3 py-1 rounded-lg border border-violet-300">F: {plan.fat}g</span>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                {/* Tùy chỉnh */}
                                <div>
                                    <h3 className="text-sm font-black text-blue-700 uppercase mb-4 tracking-wider flex items-center gap-2">
                                        <span className="text-xl">4️⃣</span>
                                        Tùy Chỉnh Thủ Công
                                    </h3>
                                    <button
                                        onClick={() => setShowMacroModal(false)}
                                        className="w-full p-4 bg-blue-50 border-2 border-blue-200 rounded-2xl hover:bg-blue-100 hover:border-blue-400 transition-all active:scale-95 text-left"
                                    >
                                        <p className="font-black text-base text-blue-900">Nhập Giá Trị Thủ Công</p>
                                        <p className="text-sm text-blue-700 font-semibold mt-2">Đóng modal và điều chỉnh trực tiếp các trường Protein, Carb, Fat</p>
                                    </button>
                                </div>
                            </div>
                            
                            {/* Footer - Sticky */}
                            <div className="sticky bottom-0 bg-gradient-to-t from-white to-slate-50 px-6 py-6 border-t border-slate-100 space-y-3">
                                <button
                                    onClick={() => setShowMacroModal(false)}
                                    className="w-full py-4 bg-slate-200 text-slate-700 rounded-2xl font-black text-base uppercase active:scale-95 transition-all hover:bg-slate-300"
                                >
                                    Đóng
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };
            
            // === 3. MÀN HÌNH HỒ SƠ ===
            if (view === "profile") {
                return (
                    <div className="max-w-md mx-auto min-h-screen bg-white p-8 flex flex-col justify-center space-y-6 animate-in fade-in duration-500 pb-28 relative">
                        <div className="text-center mb-4">
                            <h1 className="text-4xl font-black text-emerald-600 tracking-tighter italic">STAYFIT</h1>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] mt-2">Hồ sơ cá nhân</p>
                        </div>

                        <div className="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                            <button 
                                onClick={() => setProfile({...profile, gender: 'male'})} 
                                className={`flex-1 py-3 rounded-xl font-bold transition-all ${profile.gender==='male' ? 'bg-white text-emerald-600 shadow-sm':'text-slate-400'}`}
                            >
                                Nam
                            </button>
                            <button 
                                onClick={() => setProfile({...profile, gender: 'female'})} 
                                className={`flex-1 py-3 rounded-xl font-bold transition-all ${profile.gender==='female' ? 'bg-white text-emerald-600 shadow-sm':'text-slate-400'}`}
                            >
                                Nữ
                            </button>
                        </div>

                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div className="relative">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Tuổi</label>
                                    <div className="relative group">
                                        <input 
                                            type="number" 
                                            value={profile.age} 
                                            onChange={e=>setProfile({...profile, age:+e.target.value})} 
                                            className="w-full bg-slate-50 p-4 pr-12 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" 
                                        />
                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 italic">tuổi</span>
                                    </div>
                                </div>
                                <div className="relative">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Cân nặng</label>
                                    <div className="relative group">
                                        <input 
                                            type="number" 
                                            value={profile.weight} 
                                            onChange={e=>setProfile({...profile, weight:+e.target.value})} 
                                            className="w-full bg-slate-50 p-4 pr-10 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" 
                                        />
                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 italic">kg</span>
                                    </div>
                                </div>
                            </div>

                            <div className="relative">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Chiều cao</label>
                                <div className="relative group">
                                    <input 
                                        type="number" 
                                        value={profile.height} 
                                        onChange={e=>setProfile({...profile, height:+e.target.value})} 
                                        className="w-full bg-slate-50 p-4 pr-10 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" 
                                    />
                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 italic">cm</span>
                                </div>
                            </div>

                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Mức độ vận động</label>
                                <select 
                                    value={profile.activity} 
                                    onChange={e=>{ setProfile({...profile, activity:+e.target.value, isManualTarget: false}); }} 
                                    className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none cursor-pointer appearance-none"
                                >
                                    {ACTIVITY_LEVELS.map(l => ( <option key={l.value} value={l.value}>{l.label}</option> ))}
                                </select>
                            </div>

                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Mục tiêu cân nặng</label>
                                <select 
                                    value={profile.goal} 
                                    onChange={e=>{ setProfile({...profile, goal:+e.target.value, isManualTarget: false}); }} 
                                    className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none cursor-pointer appearance-none"
                                >
                                    {GOALS.map(l => ( <option key={l.value} value={l.value}>{l.label}</option> ))}
                                </select>
                            </div>
                        </div>

                        <div className="bg-slate-900 rounded-3xl p-6 text-white text-center shadow-xl flex flex-col items-center">
                            <span className="text-slate-500 text-[10px] font-black uppercase tracking-widest">Ngân sách Calo/Ngày</span>
                            <div className="flex justify-center items-end mt-1">
                                <input 
                                    type="number" 
                                    value={target} 
                                    onChange={e => {
                                        setProfile({
                                            ...profile, 
                                            isManualTarget: true, 
                                            manualTargetKcal: parseInt(e.target.value) || 0
                                        });
                                    }} 
                                    className="text-4xl font-black text-emerald-400 tracking-tighter bg-transparent text-center outline-none w-32 border-b-2 border-dashed border-slate-700 hover:border-emerald-400 focus:border-emerald-400 transition-colors" 
                                />
                                <span className="text-lg font-normal text-slate-500 italic mb-1 ml-1">kcal</span>
                            </div>
                            
                            {profile.isManualTarget && (
                                <button 
                                    onClick={() => setProfile({...profile, isManualTarget: false})} 
                                    className="text-[9px] text-emerald-500/80 mt-3 font-bold uppercase tracking-widest hover:text-emerald-400 transition-colors"
                                >
                                    ⟲ Trở về Mức Tính Tự Động ({calculatedTarget})
                                </button>
                            )}
                        </div>

                        {/* TÍNH NĂNG 7: TÙY CHỈNH MACRO */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mt-2">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Tùy chỉnh Macro</span>
                                <button 
                                    onClick={() => setProfile({...profile, isManualMacro: !profile.isManualMacro})}
                                    className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors ${profile.isManualMacro ? 'bg-emerald-500' : 'bg-slate-200'}`}
                                >
                                    <span className={`inline-block h-3 w-3 transform rounded-full bg-white transition-transform ${profile.isManualMacro ? 'translate-x-5' : 'translate-x-1'}`} />
                                </button>
                            </div>
                            
                            {profile.isManualMacro ? (
                                <>
                                    <button
                                        onClick={() => setShowMacroModal(true)}
                                        className="w-full py-2 mb-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-xl font-bold text-xs uppercase tracking-wider hover:shadow-lg active:scale-95 transition-all"
                                    >
                                        📋 Chọn Chế Độ Ăn
                                    </button>
                                    <div className="grid grid-cols-3 gap-2 animate-in fade-in slide-in-from-top-2">
                                        <div className="text-center relative">
                                            <label className="text-[9px] font-black text-emerald-500 uppercase block mb-1">Protein</label>
                                            <input type="number" value={profile.manualProtein} onChange={e => setProfile({...profile, manualProtein: e.target.value})} className="w-full bg-slate-50 py-3 rounded-xl text-center font-bold text-sm outline-none focus:ring-2 focus:ring-emerald-500/20" />
                                            <span className="text-[9px] text-slate-400 italic absolute bottom-3 right-3 pointer-events-none">g</span>
                                        </div>
                                        <div className="text-center relative">
                                            <label className="text-[9px] font-black text-blue-500 uppercase block mb-1">Carb</label>
                                            <input type="number" value={profile.manualCarb} onChange={e => setProfile({...profile, manualCarb: e.target.value})} className="w-full bg-slate-50 py-3 rounded-xl text-center font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500/20" />
                                            <span className="text-[9px] text-slate-400 italic absolute bottom-3 right-3 pointer-events-none">g</span>
                                        </div>
                                        <div className="text-center relative">
                                            <label className="text-[9px] font-black text-yellow-500 uppercase block mb-1">Fat</label>
                                            <input type="number" value={profile.manualFat} onChange={e => setProfile({...profile, manualFat: e.target.value})} className="w-full bg-slate-50 py-3 rounded-xl text-center font-bold text-sm outline-none focus:ring-2 focus:ring-yellow-500/20" />
                                            <span className="text-[9px] text-slate-400 italic absolute bottom-3 right-3 pointer-events-none">g</span>
                                        </div>
                                    </div>
                                </>
                            ) : (
                                <div className="flex justify-between items-center text-center opacity-50">
                                    <div><p className="text-[9px] font-black text-emerald-500 uppercase">Protein</p><p className="text-xs font-bold">{Math.round((target * 0.25 / 4) * 10) / 10}g</p></div>
                                    <div><p className="text-[9px] font-black text-blue-500 uppercase">Carb</p><p className="text-xs font-bold">{Math.round((target * 0.50 / 4) * 10) / 10}g</p></div>
                                    <div><p className="text-[9px] font-black text-yellow-500 uppercase">Fat</p><p className="text-xs font-bold">{Math.round((target * 0.25 / 9) * 10) / 10}g</p></div>
                                </div>
                            )}
                        </div>

                        <div className="space-y-3 mt-2">
                            <button 
                                onClick={() => setView("journal")} 
                                className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black uppercase shadow-lg shadow-emerald-200 active:scale-95 transition-all"
                            >
                                Bắt đầu ngay
                            </button>
                            
                            <button 
                                onClick={() => { 
                                    setUserId(""); 
                                    setPassword(""); 
                                    localStorage.removeItem('stayfit_userid'); 
                                    localStorage.removeItem('stayfit_password'); 
                                }} 
                                className="w-full py-4 bg-slate-100 text-slate-500 rounded-3xl font-black uppercase tracking-widest hover:bg-slate-200 active:scale-95 transition-all"
                            >
                                Đăng xuất
                            </button>
                        </div>
                        
                        <MacroModal />
                        
                        <BottomNav view={view} setView={setView} />
                    </div>
                );
            }

            // === 4. MÀN HÌNH NHẬT KÝ ===
            if (view === "journal") {
                return (
                    <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-28 animate-in fade-in duration-300 relative">
                        <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 z-20 shadow-sm">
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={() => { 
                                        const d = new Date(currentDate); 
                                        d.setDate(d.getDate()-1); 
                                        setCurrentDate(formatDate(d)); 
                                    }} 
                                    className="text-slate-300 p-1"
                                >
                                    ◀
                                </button>
                                
                                <div className="text-center min-w-[100px]">
                                    <span className="font-black text-slate-800 uppercase text-[11px] tracking-widest">
                                        {currentDate === formatDate(new Date()) ? "Hôm nay" : currentDate}
                                    </span>
                                </div>
                                
                                <button 
                                    onClick={() => { 
                                        const d = new Date(currentDate); 
                                        d.setDate(d.getDate()+1); 
                                        setCurrentDate(formatDate(d)); 
                                    }} 
                                    className="text-slate-300 p-1"
                                >
                                    ▶
                                </button>
                            </div>
                            
                            <div className="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center font-black text-xs shadow-sm">
                                SF
                            </div>
                        </header>

                        <main className="p-4 space-y-6">
                            <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 flex flex-col gap-6">
                                <div className="flex items-center justify-between">
                                    <div className="relative w-24 h-24 flex items-center justify-center">
                                        <svg className="transform -rotate-90 w-24 h-24">
                                            <circle cx="48" cy="48" r="40" stroke="#F1F5F9" strokeWidth="10" fill="transparent" />
                                            <circle 
                                                cx="48" cy="48" r="40" 
                                                stroke={dailyKcal > target ? "#EF4444" : "#10B981"} 
                                                strokeWidth="10" fill="transparent" 
                                                strokeDasharray={2 * Math.PI * 40} 
                                                strokeDashoffset={2 * Math.PI * 40 * (1 - Math.min(dailyKcal/target, 1.2))} 
                                                strokeLinecap="round" 
                                                className="transition-all duration-1000" 
                                            />
                                        </svg>
                                        <span className="absolute font-black text-xl text-slate-800">
                                            {Math.round((dailyKcal/target)*100) || 0}%
                                        </span>
                                    </div>
                                    
                                    <div className="flex-1 text-right">
                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest leading-none mb-1">Mục tiêu: {target}</p>
                                        <h3 className="text-4xl font-black text-slate-800 leading-none">{dailyKcal}</h3>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-tighter">Calo đã nạp</p>
                                    </div>
                                </div>
                                
                                <div className="border-t border-slate-50 pt-5 space-y-3">
                                    <MacroProgressBar label="Protein" current={dailyProtein} target={targetProtein} colorClass="bg-emerald-500" />
                                    <MacroProgressBar label="Carb" current={dailyCarb} target={targetCarb} colorClass="bg-blue-500" />
                                    <MacroProgressBar label="Fat" current={dailyFat} target={targetFat} colorClass="bg-yellow-400" />
                                </div>
                                
                                <div className="border-t border-slate-50 pt-5 mt-1">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Theo bữa ăn</h3>
                                    {isDailyLogEmpty ? (
                                        <p className="text-center text-[11px] italic text-slate-300 py-2">Chưa có dữ liệu hôm nay</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {mealBreakdown.map(meal => (
                                                <div key={meal.name} className="flex items-center justify-between gap-3">
                                                    <div className="flex items-center gap-2 w-24">
                                                        <span className="w-5 h-5 flex items-center justify-center text-sm">{meal.icon}</span>
                                                        <span className="font-bold text-xs text-slate-700 uppercase">{meal.name}</span>
                                                    </div>
                                                    <div className="flex-1 bg-slate-100 rounded-full h-[3px]">
                                                        <div 
                                                            className={`h-full rounded-full transition-all duration-500 ${meal.color}`} 
                                                            style={{ width: `${meal.kcal > 0 ? (meal.kcal / maxMealKcal) * 100 : 0}%` }}
                                                        ></div>
                                                    </div>
                                                    <div className="text-right min-w-[56px]">
                                                        {meal.kcal > 0 ? (
                                                            <span className="font-black text-sm text-slate-800">
                                                                {meal.kcal} <span className="text-[8px] text-slate-400 font-bold ml-0.5">KCAL</span>
                                                            </span>
                                                        ) : (
                                                            <span className="font-black text-sm text-slate-300">—</span>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
                                <div className="flex justify-between items-center mb-6">
                                    <h4 className="text-[10px] font-black text-slate-800 uppercase tracking-[0.2em] flex items-center gap-2">
                                        <IconPlus /> Thêm món
                                    </h4>
                                    
                                    <div className="relative">
                                        <select 
                                            value={selectedMeal} 
                                            onChange={e=>setSelectedMeal(e.target.value)} 
                                            className="bg-slate-50 hover:bg-emerald-50 text-[10px] font-black text-slate-600 py-2 pl-4 pr-8 rounded-full outline-none uppercase tracking-widest cursor-pointer border border-slate-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 focus:text-emerald-700 transition-all shadow-sm appearance-none select-none"
                                        >
                                            {MEAL_TYPES.map(m => (
                                                <option key={m} value={m} className="font-bold text-slate-700">{m}</option>
                                            ))}
                                        </select>
                                        <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-emerald-600">
                                            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7"/></svg>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex p-1 bg-slate-100 rounded-xl mb-4">
                                    <button 
                                        onClick={() => setTab("quick")} 
                                        className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition-all ${tab === "quick" ? "bg-white text-emerald-600 shadow-sm" : "text-slate-400"}`}
                                    >
                                        Chọn nhanh
                                    </button>
                                    <button 
                                        onClick={() => setTab("custom")} 
                                        className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition-all ${tab === "custom" ? "bg-white text-emerald-600 shadow-sm" : "text-slate-400"}`}
                                    >
                                        Nhập tay
                                    </button>
                                </div>

                                {tab === "quick" ? (
                                    <div>
                                        <div className="relative mb-4">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                                <IconSearch />
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="Tìm món ăn..." 
                                                value={searchQuery} 
                                                onChange={e => setSearchQuery(e.target.value)} 
                                                className="w-full bg-slate-50 border border-slate-100 rounded-xl py-3 pl-10 pr-4 text-xs font-bold outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                            />
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-2 max-h-56 overflow-y-auto no-scrollbar pb-2">
                                            {filteredFoods.map((f, idx) => (
                                                <div key={f.name + idx} className="relative group flex">
                                                    <button 
                                                        onClick={() => { setSelectedFood(f); setQty(f.per); }} 
                                                        className={`w-full p-4 pr-8 rounded-2xl text-left transition-all border ${selectedFood?.name === f.name ? "bg-emerald-50 border-emerald-200" : "bg-slate-50 border-transparent"} active:scale-95`}
                                                    >
                                                        <p className="text-[9px] font-black text-slate-500 uppercase leading-tight truncate mb-1">{f.name}</p>
                                                        <p className="text-sm font-black text-slate-800">
                                                            {f.kcal} <span className="text-[8px] font-normal italic opacity-40">kcal/{f.per}{f.unit}</span>
                                                        </p>
                                                    </button>
                                                    <button 
                                                        onClick={(e) => { 
                                                            e.stopPropagation();

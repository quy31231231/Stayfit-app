                                                            setConfirmModal({ isOpen: true, foodToDelete: f, alertMessage: "" }); 
                                                        }} 
                                                        className="absolute right-2 top-2 p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100"
                                                    >
                                                        <IconTrash />
                                                    </button>
                                                </div>
                                            ))}
                                            {filteredFoods.length === 0 && (
                                                <p className="col-span-2 text-center py-6 text-slate-400 text-xs italic">Không tìm thấy món ăn</p>
                                            )}
                                        </div>
                                        
                                        {selectedFood && (() => {
                                            let weightInGrams = qty;
                                            const u = selectedFood.unit.toLowerCase();
                                            
                                            if (['kg', 'l', 'lít'].includes(u)) {
                                                weightInGrams = qty * 1000;
                                            } else if (['ml', 'g', 'gram'].includes(u)) {
                                                weightInGrams = qty;
                                            } else {
                                                const mockWeights = { 'tô': 400, 'bát': 400, 'suất': 400, 'phần': 300, 'ly': 250, 'ổ': 150, 'quả': 100, 'trái': 100, 'cái': 100 };
                                                weightInGrams = qty * (mockWeights[u] || 100);
                                            }

                                            const totalKcal = calcMacro(selectedFood.kcal, selectedFood.per, qty);
                                            const totalPro = calcMacro(selectedFood.protein, selectedFood.per, qty);
                                            const totalCarb = calcMacro(selectedFood.carb, selectedFood.per, qty);
                                            const totalFat = calcMacro(selectedFood.fat, selectedFood.per, qty);

                                            return (
                                            <div className="mt-4 pt-5 border-t border-slate-100 animate-in slide-in-from-top-2">
                                                <div className="bg-slate-900 rounded-2xl p-4 mb-4 text-white shadow-xl relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 p-4 opacity-10"><IconJournal /></div>
                                                    <div className="relative z-10 flex justify-between items-start mb-3">
                                                        <div>
                                                            <h5 className="font-black text-lg text-emerald-400 leading-tight">{selectedFood.name}</h5>
                                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">{qty} {selectedFood.unit} (~{Math.round(weightInGrams)}g)</p>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="text-2xl font-black text-white">{totalKcal}</span>
                                                            <span className="text-[9px] text-slate-400 font-bold ml-1">KCAL</span>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex justify-between items-center bg-white/10 rounded-xl p-2 mb-3">
                                                        <div className="text-center w-1/3 border-r border-white/10">
                                                            <p className="text-[8px] uppercase tracking-widest text-slate-400 font-black mb-0.5">Protein</p>
                                                            <p className="text-xs font-black text-emerald-400">{totalPro}g</p>
                                                        </div>
                                                        <div className="text-center w-1/3 border-r border-white/10">
                                                            <p className="text-[8px] uppercase tracking-widest text-slate-400 font-black mb-0.5">Carb</p>
                                                            <p className="text-xs font-black text-blue-400">{totalCarb}g</p>
                                                        </div>
                                                        <div className="text-center w-1/3">
                                                            <p className="text-[8px] uppercase tracking-widest text-slate-400 font-black mb-0.5">Fat</p>
                                                            <p className="text-xs font-black text-yellow-400">{totalFat}g</p>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* TÍNH NĂNG 8: Preview Macros sau khi thêm */}
                                                <div className="mt-4 pt-4 border-t border-slate-200 animate-in fade-in">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-3">📊 Tính Năng 8: Dự Báo Macros Hôm Nay</p>
                                                    
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {/* Cột 1: Hiện tại */}
                                                        <div className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                                                            <p className="text-[7px] font-black text-slate-500 uppercase tracking-widest mb-1.5">Hiện Tại</p>
                                                            <div className="space-y-1">
                                                                <p className="text-xs font-black text-emerald-600">{dailyProtein}g</p>
                                                                <p className="text-xs font-black text-blue-600">{dailyCarb}g</p>
                                                                <p className="text-xs font-black text-yellow-600">{dailyFat}g</p>
                                                            </div>
                                                        </div>
                                                        
                                                        {/* Cột 2: Sẽ thêm */}
                                                        <div className="bg-emerald-50 rounded-lg p-3 border border-emerald-200">
                                                            <p className="text-[7px] font-black text-emerald-600 uppercase tracking-widest mb-1.5">+ Sẽ Thêm</p>
                                                            <div className="space-y-1">
                                                                <p className="text-xs font-black text-emerald-600">+{totalPro}g</p>
                                                                <p className="text-xs font-black text-blue-600">+{totalCarb}g</p>
                                                                <p className="text-xs font-black text-yellow-600">+{totalFat}g</p>
                                                            </div>
                                                        </div>
                                                        
                                                        {/* Cột 3: Dự báo */}
                                                        <div className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-lg p-3 border border-slate-700">
                                                            <p className="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-1.5">= Dự Báo</p>
                                                            <div className="space-y-1">
                                                                <p className="text-xs font-black text-emerald-400">{(dailyProtein + totalPro).toFixed(1)}g</p>
                                                                <p className="text-xs font-black text-blue-400">{(dailyCarb + totalCarb).toFixed(1)}g</p>
                                                                <p className="text-xs font-black text-yellow-400">{(dailyFat + totalFat).toFixed(1)}g</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    
                                                    {/* Hiển thị % so với target */}
                                                    <div className="mt-3 pt-3 border-t border-slate-200 grid grid-cols-3 gap-2 text-center">
                                                        <div>
                                                            <p className="text-[7px] font-black text-emerald-600 uppercase mb-1">Protein</p>
                                                            <p className="text-xs font-bold text-slate-700">{Math.round(((dailyProtein + totalPro)/targetProtein)*100)}% / 100%</p>
                                                        </div>
                                                        <div>
                                                            <p className="text-[7px] font-black text-blue-600 uppercase mb-1">Carb</p>
                                                            <p className="text-xs font-bold text-slate-700">{Math.round(((dailyCarb + totalCarb)/targetCarb)*100)}% / 100%</p>
                                                        </div>
                                                        <div>
                                                            <p className="text-[7px] font-black text-yellow-600 uppercase mb-1">Fat</p>
                                                            <p className="text-xs font-bold text-slate-700">{Math.round(((dailyFat + totalFat)/targetFat)*100)}% / 100%</p>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="flex items-center gap-3">
                                                    <div className="w-24 relative">
                                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Số lượng</label>
                                                        <input 
                                                            type="number" 
                                                            value={qty} 
                                                            step="any" 
                                                            min="0.1" 
                                                            onChange={e => setQty(parseFloat(e.target.value) || 0)} 
                                                            className="w-full bg-slate-100 text-slate-800 p-3 rounded-xl text-sm outline-none font-black text-center focus:ring-2 focus:ring-emerald-500/20 transition-all" 
                                                        />
                                                    </div>
                                                    <button 
                                                        onClick={() => handleAddSelectedFood()} 
                                                        className="flex-1 mt-4 h-12 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase shadow-xl shadow-emerald-100 flex items-center justify-center gap-1 active:scale-95 transition-all"
                                                    >
                                                        Ghi vào nhật ký <IconPlus />
                                                    </button>
                                                    <button 
                                                        onClick={() => { setSelectedFood(null); setQty(1); }} 
                                                        className="mt-4 p-3 text-slate-300 hover:text-red-500 bg-slate-50 rounded-xl transition-colors"
                                                    >
                                                        <IconTrash />
                                                    </button>
                                                </div>
                                            </div>
                                            );
                                        })()}
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <input 
                                            placeholder="Tên món ăn (vd: Gà rán...)" 
                                            value={customFood.name} 
                                            onChange={e => setCustomFood(p=>({...p, name:e.target.value}))} 
                                            className="w-full bg-slate-50 p-4 rounded-2xl text-sm outline-none font-bold focus:ring-2 focus:ring-emerald-500/20 transition-all" 
                                        />
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <input 
                                                type="number" 
                                                placeholder="Số lượng nhập" 
                                                value={customFood.quantity} 
                                                onChange={e => setCustomFood(p=>({...p, quantity:e.target.value}))} 
                                                className="bg-slate-50 p-4 rounded-2xl text-sm outline-none font-bold focus:ring-2 focus:ring-emerald-500/20 transition-all" 
                                            />
                                            <select 
                                                value={customFood.unit} 
                                                onChange={e => setCustomFood(p=>({...p, unit:e.target.value}))} 
                                                className="bg-slate-50 p-4 rounded-2xl text-sm outline-none font-bold appearance-none cursor-pointer focus:ring-2 focus:ring-emerald-500/20 transition-all"
                                            >
                                                <option value="g">g</option>
                                                <option value="kg">kg</option>
                                                <option value="ml">ml</option>
                                                <option value="lít">lít</option>
                                                <option value="phần">phần</option>
                                                <option value="ly">ly</option>
                                                <option value="tô">tô</option>
                                                <option value="quả">quả</option>
                                            </select>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="relative group">
                                                <input 
                                                    type="number" 
                                                    placeholder="Kcal" 
                                                    value={customFood.kcal} 
                                                    onChange={e => setCustomFood(p=>({...p, kcal:e.target.value}))} 
                                                    className="w-full bg-slate-50 p-4 pr-10 rounded-2xl text-sm outline-none font-bold focus:ring-2 focus:ring-orange-500/20" 
                                                />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-orange-400 uppercase">kcal</span>
                                            </div>
                                            <div className="relative group">
                                                <input 
                                                    type="number" 
                                                    placeholder="Protein" 
                                                    value={customFood.protein} 
                                                    onChange={e => setCustomFood(p=>({...p, protein:e.target.value}))} 
                                                    className="w-full bg-slate-50 p-4 pr-10 rounded-2xl text-sm outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" 
                                                />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-emerald-400 uppercase">Pro</span>
                                            </div>
                                            <div className="relative group">
                                                <input 
                                                    type="number" 
                                                    placeholder="Carb" 
                                                    value={customFood.carb} 
                                                    onChange={e => setCustomFood(p=>({...p, carb:e.target.value}))} 
                                                    className="w-full bg-slate-50 p-4 pr-10 rounded-2xl text-sm outline-none font-bold focus:ring-2 focus:ring-blue-500/20" 
                                                />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-blue-400 uppercase">Carb</span>
                                            </div>
                                            <div className="relative group">
                                                <input 
                                                    type="number" 
                                                    placeholder="Fat" 
                                                    value={customFood.fat} 
                                                    onChange={e => setCustomFood(p=>({...p, fat:e.target.value}))} 
                                                    className="w-full bg-slate-50 p-4 pr-10 rounded-2xl text-sm outline-none font-bold focus:ring-2 focus:ring-yellow-500/20" 
                                                />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-yellow-400 uppercase">Fat</span>
                                            </div>
                                        </div>

                                        {customFood.name.trim() !== "" && parseFloat(customFood.kcal) > 0 && (
                                            <button 
                                                onClick={addCustom} 
                                                className="w-full bg-slate-900 text-white p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest mt-4 active:scale-95 transition-all shadow-xl animate-in slide-in-from-bottom-4 fade-in duration-300"
                                            >
                                                Xác nhận thêm
                                            </button>
                                        )}
                                    </div>
                                )}
                            </section>

                            <div className="space-y-3 pb-4">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Danh sách nạp vào</h3>
                                {dailyLog.map(item => (
                                    <div key={item.id} className="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-slate-50 border-l-4 border-l-emerald-400 animate-in slide-in-from-left duration-300 group">
                                        <div className="flex-1 pr-3">
                                            <div className="relative inline-flex items-center bg-slate-100 hover:bg-emerald-50 rounded-md transition-colors mb-1.5 border border-transparent hover:border-emerald-200 cursor-pointer">
                                                <select 
                                                    value={item.meal || "Bữa sáng"} 
                                                    onChange={(e) => updateItemMeal(item.id, e.target.value)} 
                                                    className="text-[9px] font-black text-slate-600 hover:text-emerald-700 uppercase tracking-widest bg-transparent outline-none cursor-pointer appearance-none py-1 pl-2 pr-5 w-full h-full focus:outline-none focus:text-emerald-700 focus:bg-emerald-100 rounded-md transition-all select-none"
                                                >
                                                    {MEAL_TYPES.map(m => (
                                                        <option key={m} value={m} className="font-bold text-slate-700">{m}</option>
                                                    ))}
                                                </select>
                                                <div className="absolute right-1.5 top-1/2 -translate-y-1/2 pointer-events-none flex items-center justify-center text-slate-400">
                                                    <svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7"/></svg>
                                                </div>
                                            </div>
                                            <p className="text-xs font-bold text-slate-800 uppercase truncate mb-1.5">
                                                {item.name} &mdash; {item.quantity}{item.unit}
                                            </p>
                                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter flex items-center gap-1.5 flex-wrap">
                                                <span className="text-orange-500 font-black">{item.kcal} kcal</span>
                                                <span className="text-slate-200">|</span> P: {item.protein}g 
                                                <span className="text-slate-200">|</span> C: {item.carb}g 
                                                <span className="text-slate-200">|</span> F: {item.fat}g
                                            </p>
                                        </div>
                                        <div className="flex items-center">
                                            <button 
                                                onClick={() => removeFood(item.id)} 
                                                className="text-slate-200 hover:text-red-500 transition-colors p-2 bg-slate-50 rounded-xl group-hover:bg-red-50"
                                            >
                                                <IconTrash />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {dailyLog.length === 0 && (
                                    <p className="text-center text-slate-300 text-[10px] uppercase font-bold italic py-8 border-2 border-dashed border-slate-100 rounded-[2.5rem] tracking-[0.2em]">
                                        Danh sách trống
                                    </p>
                                )}
                            </div>

                            {confirmModal.isOpen && (
                                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                                    <div className="bg-white rounded-[2rem] p-6 max-w-xs w-full shadow-2xl animate-in zoom-in-95 duration-200">
                                        {confirmModal.alertMessage ? (
                                            <div className="text-center">
                                                <div className="w-12 h-12 rounded-full bg-orange-100 text-orange-500 flex items-center justify-center mx-auto mb-4">
                                                    <span className="font-black text-xl">!</span>
                                                </div>
                                                <h3 className="text-sm font-black text-slate-800 mb-2 uppercase tracking-widest">Thông báo</h3>
                                                <p className="text-xs text-slate-500 mb-6 font-medium leading-relaxed">{confirmModal.alertMessage}</p>
                                                <button 
                                                    onClick={() => setConfirmModal({ isOpen: false, foodToDelete: null, alertMessage: "" })} 
                                                    className="w-full py-3.5 bg-slate-900 text-white rounded-xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all"
                                                >
                                                    Đã hiểu
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="text-center">
                                                <div className="w-12 h-12 rounded-full bg-red-100 text-red-500 flex items-center justify-center mx-auto mb-4">
                                                    <IconTrash />
                                                </div>
                                                <h3 className="text-sm font-black text-slate-800 mb-2 uppercase tracking-widest">Xác nhận xóa</h3>
                                                <p className="text-xs text-slate-500 mb-6 font-medium leading-relaxed">
                                                    Bạn có chắc muốn xóa <span className="font-black text-slate-700">"{confirmModal.foodToDelete?.name}"</span>?
                                                </p>
                                                <div className="flex gap-2">
                                                    <button 
                                                        onClick={() => setConfirmModal({ isOpen: false, foodToDelete: null, alertMessage: "" })} 
                                                        className="flex-1 py-3.5 bg-slate-100 text-slate-600 rounded-xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all"
                                                    >
                                                        Hủy
                                                    </button>
                                                    <button 
                                                        onClick={handleConfirmDelete} 
                                                        className="flex-1 py-3.5 bg-red-500 text-white rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-red-200 active:scale-95 transition-all"
                                                    >
                                                        Xóa Món
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </main>
                        <BottomNav view={view} setView={setView} />
                    </div>
                );
            }

            // === 5. MÀN HÌNH LỊCH TRÌNH ===
            if (view === "calendar") {
                return (
                    <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-28 animate-in fade-in duration-300">
                        <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center shadow-sm sticky top-0 z-20">
                            <h1 className="font-black uppercase tracking-widest text-slate-800 text-xs">Lịch trình tiêu thụ</h1>
                            <button 
                                onClick={() => setView("profile")} 
                                className="w-8 h-8 bg-slate-100 rounded-xl flex items-center justify-center text-[10px] font-black text-slate-400"
                            >
                                ⚙️
                            </button>
                        </header>
                        
                        <main className="p-4 space-y-4">
                            <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden text-center">
                                <p className="text-emerald-500 text-[10px] font-black uppercase mb-1 tracking-widest">{calendarData.monthName}</p>
                                <p className="text-slate-500 text-xs font-bold mb-2 uppercase tracking-tighter">Tổng tiêu thụ tháng này:</p>
                                <h2 className="text-5xl font-black tracking-tighter">
                                    {(calendarData.monthTotalKcal || 0).toLocaleString()} 
                                    <span className="text-lg font-normal text-slate-600 italic ml-1">kcal</span>
                                </h2>
                            </div>
                            
                            <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 transition-all">
                                <div className="calendar-grid text-center">
                                    {["CN","T2","T3","T4","T5","T6","T7"].map(w => (
                                        <div key={w} className="text-[10px] font-black text-slate-200 py-3 uppercase">{w}</div>
                                    ))}
                                    {calendarData.days.map((d, i) => (
                                        <div key={i} className="aspect-square flex items-center justify-center p-0.5">
                                            {d ? (
                                                <button 
                                                    onClick={() => { setCurrentDate(d.key); setView("journal"); }} 
                                                    className={`w-full h-full rounded-2xl flex flex-col items-center justify-center transition-all ${d.key === currentDate ? 'bg-emerald-600 text-white shadow-lg scale-110':'hover:bg-slate-50 text-slate-600'}`}
                                                >
                                                    <span className="text-xs font-black">{d.day}</span>
                                                    {d.kcal > 0 && (
                                                        <div className={`w-1 h-1 rounded-full mt-1 ${d.kcal > target ? 'bg-red-400':'bg-emerald-300'}`} />
                                                    )}
                                                </button>
                                            ) : (
                                                <div className="w-full h-full opacity-0" />
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 flex justify-between items-center shadow-sm border-l-4 border-l-emerald-500">
                                <div>
                                    <h5 className="text-[9px] font-black uppercase text-slate-300 tracking-widest mb-1 italic leading-none">{currentDate}</h5>
                                    <p className="text-xl font-black text-slate-800 leading-none">
                                        {dailyKcal} <span className="text-[10px] font-normal opacity-30 italic">/ {target} kcal</span>
                                    </p>
                                </div>
                                <button 
                                    onClick={() => setView("journal")} 
                                    className="px-5 py-2.5 bg-emerald-50 text-emerald-600 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all"
                                >
                                    Chi tiết
                                </button>
                            </div>
                        </main>
                        <BottomNav view={view} setView={setView} />
                    </div>
                );
            }
            
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

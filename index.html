<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFit - Nhật ký Calo & Lịch trình</title>
    <!-- Thư viện hỗ trợ -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ICONS (SVG) ---
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconJournal = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        // --- DỮ LIỆU ---
        const COMMON_FOODS = [
            { name: "Phở bò (1 tô)", kcal: 420 },
            { name: "Bún bò Huế", kcal: 450 },
            { name: "Bún riêu (1 tô)", kcal: 400 },
            { name: "Cơm trắng (1 bát)", kcal: 260 },
            { name: "Cơm tấm sườn bì", kcal: 620 },
            { name: "Bánh mì thịt", kcal: 350 },
            { name: "Bánh cuốn (đĩa)", kcal: 360 },
            { name: "Xôi xéo (gói)", kcal: 450 },
            { name: "Ức gà (100g)", kcal: 165 },
            { name: "Trứng luộc", kcal: 78 },
            { name: "Trà sữa (ly)", kcal: 420 },
            { name: "Cà phê sữa", kcal: 140 },
        ];

        const ACTIVITY_LEVELS = [
            { label: "Ít vận động", value: 1.2 },
            { label: "Nhẹ (1-3 buổi/tuần)", value: 1.375 },
            { label: "Vừa (3-5 buổi/tuần)", value: 1.55 },
            { label: "Nhiều (6-7 buổi/tuần)", value: 1.725 }
        ];

        const GOALS = [
            { label: "Giảm cân nhanh", value: -500 },
            { label: "Giảm cân nhẹ", value: -250 },
            { label: "Duy trì", value: 0 },
            { label: "Tăng cân", value: 300 }
        ];

        const formatDate = (date) => {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // --- APP CHÍNH ---
        function App() {
            const [view, setView] = useState(() => localStorage.getItem('stayfit_setup') ? "journal" : "profile");
            const [currentDate, setCurrentDate] = useState(formatDate(new Date()));
            const [profile, setProfile] = useState(() => {
                const s = localStorage.getItem('stayfit_profile');
                return s ? JSON.parse(s) : { gender: "male", age: 25, height: 165, weight: 60, activity: 1.375, goal: 0 };
            });
            const [history, setHistory] = useState(() => {
                const s = localStorage.getItem('stayfit_history');
                return s ? JSON.parse(s) : {};
            });

            // Tự động lưu vào LocalStorage
            useEffect(() => {
                localStorage.setItem('stayfit_profile', JSON.stringify(profile));
                localStorage.setItem('stayfit_history', JSON.stringify(history));
                if (view !== "profile") localStorage.setItem('stayfit_setup', 'done');
            }, [profile, history, view]);

            const target = useMemo(() => {
                const bmr = profile.gender === "male" 
                    ? 10 * profile.weight + 6.25 * profile.height - 5 * profile.age + 5
                    : 10 * profile.weight + 6.25 * profile.height - 5 * profile.age - 161;
                return Math.round(bmr * profile.activity) + profile.goal;
            }, [profile]);

            const dailyLog = history[currentDate] || [];
            const dailyKcal = dailyLog.reduce((s, i) => s + i.kcal, 0);

            // Logic tính toán lịch tháng và sửa lỗi undefined toLocaleString
            const calendarData = useMemo(() => {
                const baseDate = new Date(currentDate);
                const year = baseDate.getFullYear();
                const month = baseDate.getMonth();
                
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                let monthTotalKcal = 0;
                const daysArray = [];

                for(let i = 0; i < firstDayOfMonth; i++) {
                    daysArray.push(null);
                }

                for(let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month, d);
                    const key = formatDate(dateObj);
                    const kcal = (history[key] || []).reduce((s, i) => s + i.kcal, 0);
                    monthTotalKcal += kcal;
                    daysArray.push({ day: d, key, kcal });
                }

                return { 
                    days: daysArray, 
                    monthTotalKcal, 
                    monthName: `Tháng ${month + 1}, ${year}` 
                };
            }, [currentDate, history]);

            const addFood = (f) => {
                const newItem = { ...f, id: Date.now() };
                setHistory(prev => ({...prev, [currentDate]: [...(prev[currentDate] || []), newItem]}));
            };

            const removeFood = (id) => {
                setHistory(prev => ({...prev, [currentDate]: (prev[currentDate] || []).filter(i => i.id !== id)}));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col relative pb-24 shadow-2xl overflow-hidden border-x border-slate-200">
                    
                    {/* --- VIEW: HỒ SƠ --- */}
                    {view === "profile" && (
                        <div className="flex-1 bg-white p-6 flex flex-col justify-center space-y-6 animate-in fade-in duration-500">
                            <div className="text-center mb-4">
                                <h1 className="text-4xl font-black text-emerald-600 tracking-tighter italic">STAYFIT</h1>
                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] mt-2">Hồ sơ cá nhân của bạn</p>
                            </div>

                            <div className="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                                <button onClick={() => setProfile({...profile, gender: 'male'})} className={`flex-1 py-3 rounded-xl font-bold transition-all ${profile.gender==='male' ? 'bg-white text-emerald-600 shadow-sm':'text-slate-400'}`}>Nam</button>
                                <button onClick={() => setProfile({...profile, gender: 'female'})} className={`flex-1 py-3 rounded-xl font-bold transition-all ${profile.gender==='female' ? 'bg-white text-emerald-600 shadow-sm':'text-slate-400'}`}>Nữ</button>
                            </div>

                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="relative">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Tuổi</label>
                                        <div className="relative">
                                            <input type="number" value={profile.age} onChange={e=>setProfile({...profile, age:+e.target.value})} className="w-full bg-slate-50 p-4 pr-12 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" />
                                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 italic">tuổi</span>
                                        </div>
                                    </div>
                                    <div className="relative">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Cân nặng</label>
                                        <div className="relative">
                                            <input type="number" value={profile.weight} onChange={e=>setProfile({...profile, weight:+e.target.value})} className="w-full bg-slate-50 p-4 pr-10 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" />
                                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 italic">kg</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="relative">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Chiều cao</label>
                                    <div className="relative">
                                        <input type="number" value={profile.height} onChange={e=>setProfile({...profile, height:+e.target.value})} className="w-full bg-slate-50 p-4 pr-10 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-emerald-500/20" />
                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 italic">cm</span>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Mức độ vận động</label>
                                    <select value={profile.activity} onChange={e=>setProfile({...profile, activity:+e.target.value})} className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none cursor-pointer appearance-none">
                                        {ACTIVITY_LEVELS.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-3xl p-6 text-white text-center shadow-xl">
                                <span className="text-slate-500 text-[10px] font-black uppercase tracking-widest">Ngân sách Calo/Ngày</span>
                                <h2 className="text-4xl font-black text-emerald-400 mt-1 tracking-tighter">{target} <span className="text-lg font-normal text-slate-500 italic">kcal</span></h2>
                            </div>

                            <button onClick={() => setView("journal")} className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black uppercase shadow-lg shadow-emerald-200 active:scale-95 transition-all">Bắt đầu ngay</button>
                        </div>
                    )}

                    {/* --- VIEW: NHẬT KÝ --- */}
                    {view === "journal" && (
                        <div className="animate-in fade-in duration-300">
                            <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 z-20 shadow-sm">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate()-1); setCurrentDate(formatDate(d)); }} className="text-slate-300 p-1">◀</button>
                                    <div className="text-center min-w-[100px]">
                                        <span className="font-black text-slate-800 uppercase text-[11px] tracking-widest">{currentDate === formatDate(new Date()) ? "Hôm nay" : currentDate}</span>
                                    </div>
                                    <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate()+1); setCurrentDate(formatDate(d)); }} className="text-slate-300 p-1">▶</button>
                                </div>
                                <div className="w-9 h-9 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center font-black text-xs shadow-sm">SF</div>
                            </header>

                            <main className="p-4 space-y-6">
                                <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 flex items-center justify-between">
                                    <div className="relative w-24 h-24 flex items-center justify-center">
                                        <svg className="transform -rotate-90 w-24 h-24">
                                            <circle cx="48" cy="48" r="40" stroke="#F1F5F9" strokeWidth="10" fill="transparent" />
                                            <circle cx="48" cy="48" r="40" stroke={dailyKcal > target ? "#EF4444" : "#10B981"} strokeWidth="10" fill="transparent" 
                                                strokeDasharray={2 * Math.PI * 40} strokeDashoffset={2 * Math.PI * 40 * (1 - Math.min(dailyKcal/target, 1.2))} strokeLinecap="round" className="transition-all duration-1000" />
                                        </svg>
                                        <span className="absolute font-black text-xl text-slate-800">{Math.round((dailyKcal/target)*100)}%</span>
                                    </div>
                                    <div className="flex-1 text-right">
                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest leading-none mb-1">Mục tiêu: {target}</p>
                                        <h3 className="text-4xl font-black text-slate-800 leading-none">{dailyKcal}</h3>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Calo đã nạp</p>
                                    </div>
                                </div>

                                <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest text-center border-b border-slate-50 pb-2">Thêm món ăn</h4>
                                    <div className="grid grid-cols-2 gap-2 max-h-56 overflow-y-auto no-scrollbar">
                                        {COMMON_FOODS.map(f => (
                                            <button key={f.name} onClick={() => addFood(f)} className="p-3 rounded-2xl bg-slate-50 hover:bg-emerald-50 text-left transition-all border border-transparent hover:border-emerald-200 active:scale-95 group">
                                                <p className="text-[10px] font-bold text-slate-700 uppercase leading-tight truncate group-hover:text-emerald-700">{f.name}</p>
                                                <p className="text-sm font-black text-emerald-600 mt-1">{f.kcal} <span className="text-[8px] font-normal italic opacity-40">kcal</span></p>
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                <div className="space-y-3 pb-4">
                                    {dailyLog.map(item => (
                                        <div key={item.id} className="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-slate-50 border-l-4 border-l-emerald-400 animate-in slide-in-from-left duration-300">
                                            <span className="text-xs font-bold text-slate-700 uppercase tracking-tight">{item.name}</span>
                                            <div className="flex items-center gap-5 pl-4 border-l border-slate-50">
                                                <span className="text-sm font-black text-slate-800">{item.kcal} <span className="text-[9px] opacity-30 italic">kcal</span></span>
                                                <button onClick={() => removeFood(item.id)} className="text-slate-200 hover:text-red-500 transition-colors p-1"><IconTrash /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {dailyLog.length === 0 && <p className="text-center text-slate-300 text-[10px] uppercase font-bold italic py-8 opacity-60 tracking-widest border-2 border-dashed border-slate-100 rounded-[2.5rem]">Chưa có dữ liệu hôm nay</p>}
                                </div>
                            </main>
                        </div>
                    )}

                    {/* --- VIEW: CALENDAR --- */}
                    {view === "calendar" && (
                        <div className="animate-in fade-in duration-300">
                            <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center shadow-sm sticky top-0 z-20">
                                <h1 className="font-black uppercase tracking-widest text-slate-800 text-xs">Lịch trình tiêu thụ</h1>
                                <button onClick={() => setView("profile")} className="w-8 h-8 bg-slate-100 rounded-xl flex items-center justify-center text-[10px] font-black text-slate-400">⚙️</button>
                            </header>
                            
                            <main className="p-4 space-y-4">
                                <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10 text-center">
                                        <p className="text-emerald-500 text-[10px] font-black uppercase mb-1 tracking-widest">{calendarData.monthName}</p>
                                        <p className="text-slate-500 text-xs font-bold mb-2 uppercase tracking-tighter">Tổng tiêu thụ tháng này:</p>
                                        <h2 className="text-5xl font-black tracking-tighter">{(calendarData.monthTotalKcal || 0).toLocaleString()} <span className="text-lg font-normal text-slate-600 italic ml-1">kcal</span></h2>
                                    </div>
                                    <div className="absolute -right-10 -bottom-10 w-40 h-40 bg-emerald-500/10 rounded-full blur-3xl"></div>
                                </div>

                                <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 transition-all">
                                    <div className="calendar-grid text-center mb-2">
                                        {["CN","T2","T3","T4","T5","T6","T7"].map(w => <div key={w} className="text-[10px] font-black text-slate-200 py-3 uppercase tracking-tighter">{w}</div>)}
                                        {calendarData.days.map((d, i) => (
                                            <div key={i} className="aspect-square flex items-center justify-center p-0.5">
                                                {d ? (
                                                    <button 
                                                        onClick={() => { setCurrentDate(d.key); setView("journal"); }} 
                                                        className={`w-full h-full rounded-2xl flex flex-col items-center justify-center transition-all ${d.key === currentDate ? 'bg-emerald-600 text-white shadow-lg scale-110':'hover:bg-slate-50 text-slate-600'}`}
                                                    >
                                                        <span className="text-xs font-black">{d.day}</span>
                                                        {d.kcal > 0 && <div className={`w-1 h-1 rounded-full mt-1 ${d.kcal > target ? 'bg-red-400':'bg-emerald-300'}`} />}
                                                    </button>
                                                ) : <div className="w-full h-full opacity-0" />}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-slate-50 flex justify-center gap-6">
                                        <div className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">An toàn</span></div>
                                        <div className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-red-500"></div><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Quá mức</span></div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 flex justify-between items-center shadow-sm border-l-4 border-l-emerald-500">
                                    <div>
                                        <h5 className="text-[9px] font-black uppercase text-slate-300 tracking-widest mb-1 italic leading-none">{currentDate}</h5>
                                        <p className="text-xl font-black text-slate-800 leading-none">{dailyKcal} <span className="text-[10px] font-normal opacity-30 italic">/ {target} kcal</span></p>
                                    </div>
                                    <button onClick={() => setView("journal")} className="px-5 py-2.5 bg-emerald-50 text-emerald-600 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">Chi tiết</button>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* --- NAVIGATION DƯỚI --- */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 z-40 flex justify-around items-center rounded-t-[2.5rem] shadow-xl">
                        <button onClick={() => setView("journal")} className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view==='journal' ? 'text-emerald-600 scale-110 font-black':'text-slate-300 opacity-60'}`}>
                            <IconJournal /><span className="text-[9px] uppercase font-bold tracking-tighter">Nhật ký</span>
                        </button>
                        <button onClick={() => setView("calendar")} className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view==='calendar' ? 'text-emerald-600 scale-110 font-black':'text-slate-300 opacity-60'}`}>
                            <IconCalendar /><span className="text-[9px] uppercase font-bold tracking-tighter">Lịch trình</span>
                        </button>
                        <button onClick={() => setView("profile")} className={`flex flex-col items-center gap-1.5 transition-all duration-300 ${view==='profile' ? 'text-emerald-600 scale-110 font-black':'text-slate-300 opacity-60'}`}>
                            <IconUser /><span className="text-[9px] uppercase font-bold tracking-tighter">Hồ sơ</span>
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
